name: E2E UI Tests CI

# 触发器：当有人往 main 分支推代码，或者提 PR 时，立刻触发流水线
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    # 告诉 GitHub，给我分配一台干净的 Ubuntu 最新版云端服务器
    runs-on: ubuntu-latest

    steps:
    - name: 1. 拉取仓库代码
      uses: actions/checkout@v4

    - name: 2. 安装 Python 3.10 环境
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: 3. 安装 Python 依赖包
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. 安装 Playwright 及 Linux 浏览器底层依赖 (极其关键的 --with-deps)
      run: playwright install chromium --with-deps

    - name: 5. 执行 Pytest 自动化测试
      # 跑我们之前写的测试，并生成报告
      run: pytest tests/ -v

    - name: 6. 收集并上传测试报告与录屏证据 (无论成功失败都执行)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-test-results
        path: |
          report.html
          test-results/
        retention-days: 7